services:
  - type: web
    name: gamechess-coach-engine
    runtime: docker
    plan: free
    region: frankfurt
    dockerfilePath: ./coach-engine/Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: APP_TIMEZONE
        value: Europe/Madrid
      - key: STOCKFISH_PATH
        value: /usr/games/stockfish
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
